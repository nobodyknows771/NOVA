<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Crazy dark bg -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="50%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    
    <!-- NOVA neon gradient -->
    <linearGradient id="novaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="33%" stop-color="#ff00e4"/>
      <stop offset="66%" stop-color="#7d00ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glowSuper">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowNeon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Matrix rain pattern -->
    <pattern id="matrix" width="20" height="20" patternUnits="userSpaceOnUse">
      <text x="2" y="15" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.03">0</text>
      <text x="12" y="8" font-family="monospace" font-size="8" fill="#00ff41" opacity="0.02">1</text>
    </pattern>
    
    <!-- Neural network pattern -->
    <pattern id="neural" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="#7d00ff" opacity="0.08"/>
      <line x1="30" y1="30" x2="0" y2="0" stroke="#7d00ff" stroke-width="0.3" opacity="0.05"/>
      <line x1="30" y1="30" x2="60" y2="0" stroke="#7d00ff" stroke-width="0.3" opacity="0.05"/>
      <line x1="30" y1="30" x2="0" y2="60" stroke="#7d00ff" stroke-width="0.3" opacity="0.05"/>
      <line x1="30" y1="30" x2="60" y2="60" stroke="#7d00ff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background layers -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>
  <rect width="600" height="800" fill="url(#matrix)"/>
  <rect width="600" height="800" fill="url(#neural)"/>
  
  <!-- Holographic grid lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
  </g>
  
  <!-- Animated scanning line (represents bot processing) -->
  <line x1="0" y1="380" x2="600" y2="380" stroke="#ff00e4" stroke-width="2" opacity="0.15" filter="url(#glowNeon)"/>
  <line x1="0" y1="390" x2="600" y2="390" stroke="#00f0ff" stroke-width="1" opacity="0.1"/>
  
  <!-- Central AI brain core -->
  <g transform="translate(300, 400)">
    <!-- Outer rings -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.15">
      <animate attributeName="r" values="110;120;110" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ff00e4" stroke-width="1.5" opacity="0.2">
      <animate attributeName="r" values="85;95;85" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#7d00ff" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="60;70;60" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Spinning rings -->
    <ellipse cx="0" cy="0" rx="80" ry="20" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" transform="rotate(-30)">
      <animateTransform attributeName="transform" type="rotate" from="-30 0 0" to="330 0 0" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="80" ry="15" fill="none" stroke="#ff00e4" stroke-width="1" opacity="0.3" transform="rotate(45)">
      <animateTransform attributeName="transform" type="rotate" from="45 0 0" to="405 0 0" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Core orb -->
    <circle cx="0" cy="0" r="30" fill="url(#novaGrad)" filter="url(#glowSuper)" opacity="0.9">
      <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="20" fill="#0a0015" opacity="0.8"/>
    <circle cx="0" cy="0" r="10" fill="url(#novaGrad)" opacity="0.7">
      <animate attributeName="r" values="10;12;10" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#ffffff" filter="url(#glowNeon)">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Neural synapses from core -->
    <g opacity="0.4">
      <line x1="0" y1="0" x2="-40" y2="-40" stroke="#00f0ff" stroke-width="1.5">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="40" y2="-40" stroke="#ff00e4" stroke-width="1.5">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="-40" y2="40" stroke="#7d00ff" stroke-width="1.5">
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="40" y2="40" stroke="#00f0ff" stroke-width="1.5">
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
  
  <!-- NOVA main title - GLITCH EFFECT -->
  <text x="300" y="180" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="130" font-weight="900" fill="url(#novaGrad)" filter="url(#glowSuper)" letter-spacing="15">
    NOVA
  </text>
  
  <!-- Glitch offset layers -->
  <text x="298" y="180" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="130" font-weight="900" fill="#ff00e4" opacity="0.3" letter-spacing="15">
    NOVA
  </text>
  <text x="302" y="182" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="130" font-weight="900" fill="#00f0ff" opacity="0.2" letter-spacing="15">
    NOVA
  </text>
  
  <!-- Subtitle with code vibe -->
  <text x="300" y="230" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00f0ff" opacity="0.6" letter-spacing="8">
    &lt; SYSTEM_ACTIVE /&gt;
  </text>
  
  <!-- Bot commands floating -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00f0ff" opacity="0.3">
    <text x="60" y="280">/start</text>
    <text x="520" y="310">/help</text>
    <text x="50" y="620">/stats</text>
    <text x="480" y="650">/admin</text>
  </g>
  
  <!-- Feature cards (cyber style) -->
  <g transform="translate(0, 530)">
    <!-- Card 1 -->
    <rect x="30" y="0" width="250" height="80" rx="5" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
    <rect x="32" y="2" width="246" height="76" rx="4" fill="#050510" opacity="0.5"/>
    <text x="50" y="25" font-family="'Segoe UI', sans-serif" font-size="14" fill="#00f0ff" font-weight="bold" opacity="0.8">⚡ 100K+ MSG/SEC</text>
    <text x="50" y="45" font-family="'Courier New', monospace" font-size="10" fill="#7d00ff" opacity="0.6">REAL-TIME PROCESSING</text>
    <text x="50" y="62" font-family="'Courier New', monospace" font-size="9" fill="#505070" opacity="0.5">UPTIME: 99.99%</text>
    
    <!-- Card 2 -->
    <rect x="320" y="0" width="250" height="80" rx="5" fill="none" stroke="#ff00e4" stroke-width="1" opacity="0.3"/>
    <rect x="322" y="2" width="246" height="76" rx="4" fill="#050510" opacity="0.5"/>
    <text x="340" y="25" font-family="'Segoe UI', sans-serif" font-size="14" fill="#ff00e4" font-weight="bold" opacity="0.8">🧠 AI SELF-LEARNING</text>
    <text x="340" y="45" font-family="'Courier New', monospace" font-size="10" fill="#7d00ff" opacity="0.6">ADAPTIVE RESPONSES</text>
    <text x="340" y="62" font-family="'Courier New', monospace" font-size="9" fill="#505070" opacity="0.5">MODEL: v4.2.0</text>
  </g>
  
  <!-- Bottom holographic bar -->
  <rect x="50" y="680" width="500" height="3" fill="url(#novaGrad)" opacity="0.4" filter="url(#glowNeon)"/>
  
  <text x="300" y="715" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00f0ff" opacity="0.5" letter-spacing="6">
    DEPLOYED ON TELEGRAM
  </text>
  
  <text x="300" y="740" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#505070" opacity="0.4" letter-spacing="3">
    [ BOT FRAMEWORK v3.2.1 ] — ENTERPRISE GRADE
  </text>
  
  <!-- Live data stream at bottom -->
  <g font-family="'Courier New', monospace" font-size="8" fill="#00f0ff" opacity="0.2">
    <text x="30" y="770">[14:32:08] SYS: BOT ONLINE — ALL SYSTEMS NOMINAL</text>
    <text x="30" y="782">[14:32:09] SYS: 2,847 ACTIVE SESSIONS — 0 ERRORS</text>
    <text x="30" y="794">[14:32:10] SYS: MEMORY USAGE 43% — CPU 12%</text>
  </g>
  
  <!-- Corner glitch effects -->
  <g opacity="0.4">
    <rect x="20" y="20" width="40" height="3" fill="#ff00e4" filter="url(#glowNeon)"/>
    <rect x="20" y="23" width="25" height="2" fill="#00f0ff" filter="url(#glowNeon)"/>
    <rect x="540" y="20" width="40" height="3" fill="#ff00e4" filter="url(#glowNeon)"/>
    <rect x="555" y="23" width="25" height="2" fill="#00f0ff" filter="url(#glowNeon)"/>
    <rect x="20" y="777" width="40" height="3" fill="#ff00e4" filter="url(#glowNeon)"/>
    <rect x="20" y="780" width="25" height="2" fill="#00f0ff" filter="url(#glowNeon)"/>
    <rect x="540" y="777" width="40" height="3" fill="#ff00e4" filter="url(#glowNeon)"/>
    <rect x="555" y="780" width="25" height="2" fill="#00f0ff" filter="url(#glowNeon)"/>
  </g>
</svg>
